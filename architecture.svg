<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="760" viewBox="0 0 1040 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .lbl { fill:#334155; font-size:12px; }
      .edge { stroke:#475569; stroke-width:1.6; fill:none; }
      .box { rx:10; ry:10; stroke-width:1.6; }
      .title { font-weight:700; }
      .sub { font-size:11px; fill:#64748b; }
    </style>
  </defs>

  <rect width="1040" height="760" fill="#ffffff"/>
  <text x="40" y="44" font-size="22" class="title" fill="#0f172a">Self-Hosted n8n on AWS — Architecture</text>
  <text x="40" y="66" font-size="13" fill="#64748b">EC2 t3.medium · k3s · n8n queue mode · Caddy auto-HTTPS</text>

  <!-- External actors -->
  <rect x="60" y="120" width="150" height="56" class="box" fill="#eef2ff" stroke="#6366f1"/>
  <text x="135" y="146" text-anchor="middle" class="title" fill="#3730a3" font-size="13">User / Browser</text>
  <text x="135" y="164" text-anchor="middle" class="sub">HTTPS</text>

  <rect x="60" y="220" width="150" height="56" class="box" fill="#ecfeff" stroke="#0891b2"/>
  <text x="135" y="246" text-anchor="middle" class="title" fill="#155e75" font-size="13">DuckDNS</text>
  <text x="135" y="264" text-anchor="middle" class="sub">dynamic DNS</text>

  <rect x="60" y="560" width="150" height="56" class="box" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="135" y="586" text-anchor="middle" class="title" fill="#166534" font-size="13">Let's Encrypt</text>
  <text x="135" y="604" text-anchor="middle" class="sub">ACME / TLS</text>

  <!-- AWS boundary -->
  <rect x="300" y="100" width="690" height="540" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="320" y="128" class="title" fill="#9a3412" font-size="14">AWS · eu-central-1 · EC2 t3.medium</text>

  <!-- k3s boundary -->
  <rect x="330" y="150" width="630" height="460" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="350" y="176" class="title" fill="#1e40af" font-size="13">k3s cluster</text>

  <!-- Caddy -->
  <rect x="360" y="210" width="180" height="66" class="box" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="450" y="238" text-anchor="middle" class="title" fill="#854d0e" font-size="13">Caddy</text>
  <text x="450" y="257" text-anchor="middle" class="sub">reverse proxy + auto-HTTPS</text>

  <!-- n8n main -->
  <rect x="620" y="210" width="190" height="66" class="box" fill="#ffe4e6" stroke="#e11d48"/>
  <text x="715" y="238" text-anchor="middle" class="title" fill="#9f1239" font-size="13">n8n main</text>
  <text x="715" y="257" text-anchor="middle" class="sub">UI · API · triggers</text>

  <!-- Redis -->
  <rect x="620" y="320" width="190" height="60" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="715" y="346" text-anchor="middle" class="title" fill="#991b1b" font-size="13">Redis</text>
  <text x="715" y="364" text-anchor="middle" class="sub">queue broker</text>

  <!-- Workers -->
  <rect x="600" y="430" width="120" height="60" class="box" fill="#ffe4e6" stroke="#e11d48"/>
  <text x="660" y="456" text-anchor="middle" class="title" fill="#9f1239" font-size="13">n8n worker 1</text>
  <text x="660" y="474" text-anchor="middle" class="sub">executes jobs</text>

  <rect x="740" y="430" width="120" height="60" class="box" fill="#ffe4e6" stroke="#e11d48"/>
  <text x="800" y="456" text-anchor="middle" class="title" fill="#9f1239" font-size="13">n8n worker 2</text>
  <text x="800" y="474" text-anchor="middle" class="sub">scalable</text>

  <!-- Postgres -->
  <rect x="360" y="430" width="180" height="60" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="450" y="456" text-anchor="middle" class="title" fill="#075985" font-size="13">PostgreSQL</text>
  <text x="450" y="474" text-anchor="middle" class="sub">execution data</text>

  <!-- External APIs -->
  <rect x="360" y="540" width="180" height="56" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="450" y="566" text-anchor="middle" class="title" fill="#334155" font-size="13">External APIs</text>
  <text x="450" y="584" text-anchor="middle" class="sub">OpenAI · webhooks</text>

  <!-- Edges -->
  <!-- user -> duck -->
  <path class="edge" d="M135,176 L135,220" marker-end="url(#arrow)"/>
  <!-- duck -> caddy -->
  <path class="edge" d="M210,248 L360,243" marker-end="url(#arrow)"/>
  <text x="250" y="238" class="lbl">HTTPS</text>
  <!-- caddy <-> LE -->
  <path class="edge" d="M380,276 C300,420 200,470 160,560" marker-end="url(#arrow)"/>
  <text x="215" y="450" class="lbl">ACME</text>
  <!-- caddy -> main -->
  <path class="edge" d="M540,243 L620,243" marker-end="url(#arrow)"/>
  <!-- main -> redis -->
  <path class="edge" d="M715,276 L715,320" marker-end="url(#arrow)"/>
  <text x="725" y="302" class="lbl">enqueue</text>
  <!-- redis -> workers -->
  <path class="edge" d="M690,380 L665,430" marker-end="url(#arrow)"/>
  <path class="edge" d="M745,380 L795,430" marker-end="url(#arrow)"/>
  <text x="640" y="410" class="lbl">dispatch</text>
  <!-- main -> pg -->
  <path class="edge" d="M620,260 C540,300 460,360 450,430" marker-end="url(#arrow)"/>
  <!-- workers -> pg -->
  <path class="edge" d="M600,468 L540,464" marker-end="url(#arrow)"/>
  <!-- workers -> ext -->
  <path class="edge" d="M650,490 C560,515 500,520 470,540" marker-end="url(#arrow)"/>

  <text x="40" y="720" font-size="11" fill="#94a3b8">Requests terminate TLS at Caddy → n8n main enqueues executions in Redis → workers run them and persist to PostgreSQL. Workers scale horizontally, independent of the editor.</text>
</svg>
